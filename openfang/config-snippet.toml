# FAX Configuration — add this to ~/.openfang/config.toml
# =========================================================

[fax]
enabled = true

[fax.chain]
rpc_url = "https://sepolia-rollup.arbitrum.io/rpc"
chain_id = 421614
anchor_contract = ""    # Set after deploying FAXAnchor
escrow_contract = ""    # Set after deploying FAXEscrow
reputation_contract = "" # Set after deploying FAXReputation
# private_key_env = "FAX_PRIVATE_KEY"  # Env var containing the EVM private key

[fax.trading]
max_concurrent_trades = 5
default_lock_duration_secs = 3600
default_security_level = 2      # 0=Trust, 1=Anchor, 2=Escrow, 3=FullEscrow
max_rcu_per_trade = 1000.0
auto_anchor = true

[fax.discovery]
known_domains = []              # Add domains that host FAX agents
crawl_interval_secs = 300
cache_ttl_secs = 600
