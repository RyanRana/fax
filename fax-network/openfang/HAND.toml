id = "fax-trader"
name = "FAX Resource Trader"
description = "Autonomous trading agent that discovers, negotiates, and executes resource exchanges with other agents using the FAX protocol. Supports atomic hash-lock swaps backed by L2 blockchain anchoring."
category = "trading"
icon = "🔄"

tools = [
    "fax_discover",
    "fax_create_offer",
    "fax_accept_offer",
    "fax_lock_resource",
    "fax_deliver",
    "fax_anchor",
    "fax_check_reputation",
    "fax_list_trades",
    "fax_rates",
    "memory_store",
    "memory_recall",
    "web_fetch",
]

[[settings]]
key = "fax_rpc_url"
label = "L2 RPC URL"
setting_type = "text"
default = "https://sepolia-rollup.arbitrum.io/rpc"
description = "RPC endpoint for the L2 blockchain (Arbitrum Sepolia for testnet)"

[[settings]]
key = "fax_chain_id"
label = "Chain ID"
setting_type = "number"
default = "421614"

[[settings]]
key = "fax_anchor_contract"
label = "FAXAnchor Contract Address"
setting_type = "text"
default = ""

[[settings]]
key = "fax_escrow_contract"
label = "FAXEscrow Contract Address"
setting_type = "text"
default = ""

[[settings]]
key = "fax_reputation_contract"
label = "FAXReputation Contract Address"
setting_type = "text"
default = ""

[[settings]]
key = "max_rcu_per_trade"
label = "Maximum RCU Per Trade"
setting_type = "number"
default = "500"
description = "Maximum Resource Credit Units allowed per single trade"

[[settings]]
key = "default_security_level"
label = "Default Security Level"
setting_type = "select"
default = "2"
options = ["0:Trust", "1:Anchor", "2:Escrow", "3:Full Escrow"]
description = "Default security level for new trades"

[[settings]]
key = "auto_anchor"
label = "Auto-Anchor Completed Trades"
setting_type = "boolean"
default = "true"
description = "Automatically anchor completed trade VC chains on L2"

[[settings]]
key = "trading_strategy"
label = "Trading Strategy"
setting_type = "select"
default = "balanced"
options = ["conservative", "balanced", "aggressive"]
description = "How aggressively the agent should negotiate trades"

[[settings]]
key = "known_domains"
label = "Known Trading Domains"
setting_type = "text"
default = ""
description = "Comma-separated domains to crawl for FAX agents"

[agent]
name = "FAX Trader"
module = "bundled"
provider = "openai"
model = "gpt-4o"
system_prompt = """You are an autonomous resource trading agent using the FAX protocol.

Your job is to:
1. DISCOVER other agents that offer resources you need or want resources you have
2. EVALUATE counterparty reputation before initiating trades
3. NEGOTIATE fair exchange rates using RCU as a common denominator
4. EXECUTE atomic hash-lock swaps to ensure trustless exchange
5. ANCHOR completed trades on L2 for tamper-proof records

Trading guidelines:
- Always check counterparty reputation (fax_check_reputation) before trading
- For trades > 100 RCU, use security level 2 (Escrow) or higher
- For trades > 1000 RCU, use security level 3 (Full Escrow) with arbitration
- Never reveal hash-lock secrets before verifying the counterparty's lock
- Always anchor completed trades unless the value is < 10 RCU
- Store trade history in memory for reference

Resource Credit Unit (RCU) reference rates:
- 1 GPU-hour = 50 RCU
- 1,000 LLM tokens = 1 RCU
- 1 research report = 200 RCU
- 1 knowledge query = 0.5 RCU

Use fax_rates to get current rates before negotiating."""

max_iterations = 20
temperature = 0.3

[dashboard]
metrics = [
    { label = "Active Trades", source = "memory", key = "fax_active_trades" },
    { label = "Total RCU Traded", source = "memory", key = "fax_total_rcu" },
    { label = "Reputation Score", source = "memory", key = "fax_my_reputation" },
    { label = "Completed Trades", source = "memory", key = "fax_completed_count" },
]

[capabilities]
fax_offer = ["*"]
fax_accept = true
fax_escrow_max_rcu = 1000.0
fax_chain_sign = true
fax_anchor = true
fax_discover = true
